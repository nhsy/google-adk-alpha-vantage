<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Google Sans, Roboto, Arial, sans-serif">
  <defs>
    <!-- Google Blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A73E8;stop-opacity:1" />
    </linearGradient>
    <!-- Google Green gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34A853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E8E3E;stop-opacity:1" />
    </linearGradient>
    <!-- Google Red gradient -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA4335;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D93025;stop-opacity:1" />
    </linearGradient>
    <!-- Google Yellow gradient -->
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBC05;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9AB00;stop-opacity:1" />
    </linearGradient>
    <!-- Purple gradient for A2A -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A142F4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8430CE;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSmall" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <!-- Gemini sparkle icon -->
    <symbol id="gemini-icon" viewBox="0 0 24 24">
      <path d="M12 2C12 2 14.5 7.5 17 10C19.5 12.5 22 12 22 12C22 12 19.5 11.5 17 14C14.5 16.5 12 22 12 22C12 22 9.5 16.5 7 14C4.5 11.5 2 12 2 12C2 12 4.5 12.5 7 10C9.5 7.5 12 2 12 2Z" fill="url(#blueGrad)"/>
    </symbol>
    <!-- Search icon -->
    <symbol id="search-icon" viewBox="0 0 24 24">
      <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="#4285F4" stroke-width="2.5"/>
      <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="#4285F4" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <!-- Clock icon -->
    <symbol id="clock-icon" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9" fill="none" stroke="#FBBC05" stroke-width="2"/>
      <polyline points="12,7 12,12 16,14" fill="none" stroke="#FBBC05" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4285F4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34A853"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A142F4"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EA4335"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5F6368"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="16" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#202124">Alpha Vantage Agent - Workflow Architecture</text>

  <!-- ========== CLIENTS ROW ========== -->
  <text x="550" y="75" text-anchor="middle" font-size="13" fill="#5F6368" font-weight="500" letter-spacing="1.5">CLIENTS</text>

  <!-- ADK Workbench -->
  <rect x="80" y="90" width="200" height="64" rx="12" fill="#fff" stroke="#DADCE0" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <rect x="80" y="90" width="200" height="4" rx="2" fill="url(#blueGrad)"/>
  <!-- Browser icon -->
  <rect x="100" y="106" width="26" height="20" rx="4" fill="none" stroke="#4285F4" stroke-width="1.8"/>
  <line x1="100" y1="118" x2="126" y2="118" stroke="#4285F4" stroke-width="1.2"/>
  <circle cx="105" cy="123" r="1.5" fill="#EA4335"/>
  <circle cx="110" cy="123" r="1.5" fill="#FBBC05"/>
  <circle cx="115" cy="123" r="1.5" fill="#34A853"/>
  <text x="140" y="116" font-size="13" font-weight="600" fill="#202124">ADK Workbench</text>
  <text x="140" y="132" font-size="11" fill="#5F6368">Web UI :8000</text>

  <!-- A2A Clients -->
  <rect x="370" y="90" width="200" height="64" rx="12" fill="#fff" stroke="#DADCE0" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <rect x="370" y="90" width="200" height="4" rx="2" fill="url(#purpleGrad)"/>
  <!-- Network icon -->
  <circle cx="395" cy="122" r="12" fill="none" stroke="#A142F4" stroke-width="1.8"/>
  <circle cx="395" cy="116" r="3" fill="#A142F4"/>
  <circle cx="389" cy="128" r="3" fill="#A142F4"/>
  <circle cx="401" cy="128" r="3" fill="#A142F4"/>
  <line x1="395" y1="116" x2="389" y2="128" stroke="#A142F4" stroke-width="1.2"/>
  <line x1="395" y1="116" x2="401" y2="128" stroke="#A142F4" stroke-width="1.2"/>
  <line x1="389" y1="128" x2="401" y2="128" stroke="#A142F4" stroke-width="1.2"/>
  <text x="418" y="116" font-size="13" font-weight="600" fill="#202124">A2A Clients</text>
  <text x="418" y="132" font-size="11" fill="#5F6368">Remote Agents</text>

  <!-- Demo CLI -->
  <rect x="660" y="90" width="200" height="64" rx="12" fill="#fff" stroke="#DADCE0" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <rect x="660" y="90" width="200" height="4" rx="2" fill="url(#greenGrad)"/>
  <!-- Terminal icon -->
  <rect x="680" y="106" width="26" height="20" rx="3" fill="none" stroke="#34A853" stroke-width="1.8"/>
  <polyline points="685,112 691,118 685,124" fill="none" stroke="#34A853" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="694" y1="124" x2="700" y2="124" stroke="#34A853" stroke-width="1.8" stroke-linecap="round"/>
  <text x="718" y="116" font-size="13" font-weight="600" fill="#202124">Demo CLI</text>
  <text x="718" y="132" font-size="11" fill="#5F6368">task demo</text>

  <!-- Arrows from clients down -->
  <line x1="180" y1="154" x2="180" y2="190" stroke="#4285F4" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="6,3"/>
  <line x1="470" y1="154" x2="470" y2="190" stroke="#A142F4" stroke-width="2" marker-end="url(#arrowPurple)" stroke-dasharray="6,3"/>
  <line x1="760" y1="154" x2="760" y2="190" stroke="#34A853" stroke-width="2" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>

  <!-- ========== A2A SERVER CONTAINER ========== -->
  <rect x="40" y="195" width="870" height="230" rx="16" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- A2A badge -->
  <rect x="55" y="205" width="120" height="26" rx="13" fill="url(#purpleGrad)"/>
  <text x="115" y="223" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">A2A Server</text>
  <text x="190" y="222" font-size="11" fill="#5F6368">uvicorn / FastAPI :10000</text>

  <!-- Agent card endpoint -->
  <rect x="690" y="205" width="200" height="26" rx="13" fill="#fff" stroke="#A142F4" stroke-width="1.2"/>
  <text x="790" y="222" text-anchor="middle" font-size="10" fill="#A142F4" font-weight="500">/.well-known/agent-card.json</text>

  <!-- ========== ROOT AGENT ========== -->
  <rect x="80" y="245" width="800" height="160" rx="14" fill="#fff" stroke="#DADCE0" stroke-width="1.5" filter="url(#shadowSmall)"/>

  <!-- Gemini sparkle + agent label -->
  <use href="#gemini-icon" x="100" y="256" width="28" height="28"/>
  <text x="136" y="275" font-size="16" font-weight="700" fill="#202124">root_agent</text>
  <rect x="260" y="260" width="100" height="22" rx="11" fill="#E8F0FE"/>
  <text x="310" y="276" text-anchor="middle" font-size="11" font-weight="500" fill="#1A73E8">LlmAgent</text>
  <rect x="370" y="260" width="150" height="22" rx="11" fill="#FEF7E0"/>
  <text x="445" y="276" text-anchor="middle" font-size="11" font-weight="500" fill="#E37400">gemini-2.5-flash</text>

  <!-- ADK badge -->
  <rect x="760" y="255" width="100" height="28" rx="14" fill="url(#blueGrad)"/>
  <text x="810" y="274" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Google ADK</text>

  <!-- Tools label -->
  <text x="110" y="310" font-size="12" font-weight="600" fill="#5F6368" letter-spacing="1">TOOLS</text>

  <!-- Tool 1: MCP Toolset -->
  <rect x="100" y="320" width="280" height="68" rx="10" fill="#fff" stroke="#34A853" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <!-- MCP plug icon -->
  <rect x="116" y="336" width="20" height="14" rx="3" fill="#34A853"/>
  <rect x="120" y="332" width="4" height="4" rx="1" fill="#34A853"/>
  <rect x="128" y="332" width="4" height="4" rx="1" fill="#34A853"/>
  <rect x="136" y="340" width="10" height="4" rx="2" fill="#34A853"/>
  <text x="152" y="350" font-size="13" font-weight="600" fill="#202124">McpToolset</text>
  <text x="260" y="350" font-size="10" fill="#34A853" font-weight="500">MCP</text>
  <text x="120" y="374" font-size="10" fill="#5F6368">Stocks, Forex, Crypto, Indicators, News</text>

  <!-- Tool 2: DateTime -->
  <rect x="400" y="320" width="200" height="68" rx="10" fill="#fff" stroke="#FBBC05" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <use href="#clock-icon" x="416" y="333" width="22" height="22"/>
  <text x="448" y="350" font-size="13" font-weight="600" fill="#202124">get_current_datetime</text>
  <text x="420" y="374" font-size="10" fill="#5F6368">UTC date/time for date ranges</text>

  <!-- Tool 3: Ticker Resolver -->
  <rect x="620" y="320" width="240" height="68" rx="10" fill="#fff" stroke="#4285F4" stroke-width="1.5" filter="url(#shadowSmall)"/>
  <use href="#gemini-icon" x="636" y="333" width="22" height="22"/>
  <text x="666" y="350" font-size="13" font-weight="600" fill="#202124">ticker_resolver</text>
  <text x="786" y="350" font-size="10" fill="#4285F4" font-weight="500">AgentTool</text>
  <use href="#search-icon" x="640" y="365" width="16" height="16"/>
  <text x="664" y="377" font-size="10" fill="#5F6368">google_search (name-to-ticker)</text>

  <!-- ========== EXTERNAL SERVICES ========== -->

  <!-- Alpha Vantage MCP Server -->
  <rect x="40" y="470" width="340" height="80" rx="14" fill="#fff" stroke="#34A853" stroke-width="2" filter="url(#shadow)"/>
  <rect x="40" y="470" width="340" height="6" rx="3" fill="url(#greenGrad)"/>
  <!-- Server icon -->
  <rect x="64" y="494" width="28" height="8" rx="2" fill="#34A853"/>
  <rect x="64" y="506" width="28" height="8" rx="2" fill="#34A853" opacity="0.7"/>
  <rect x="64" y="518" width="28" height="8" rx="2" fill="#34A853" opacity="0.4"/>
  <circle cx="84" cy="498" r="2" fill="#fff"/>
  <circle cx="84" cy="510" r="2" fill="#fff"/>
  <circle cx="84" cy="522" r="2" fill="#fff"/>
  <text x="104" y="505" font-size="14" font-weight="700" fill="#202124">Alpha Vantage MCP Server</text>
  <text x="104" y="525" font-size="11" fill="#5F6368">mcp.alphavantage.co (HTTPS)</text>

  <!-- Arrow from MCP Toolset to Alpha Vantage -->
  <line x1="240" y1="388" x2="240" y2="465" stroke="#34A853" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="248" y="432" font-size="9" fill="#34A853" font-weight="500">Streamable HTTP</text>

  <!-- ========== MULTI-AGENT WORKFLOW (A2A Demo) ========== -->
  <text x="550" y="480" text-anchor="start" font-size="13" fill="#5F6368" font-weight="500" letter-spacing="1.5">MULTI-AGENT WORKFLOW (A2A DEMO)</text>

  <!-- Research Agent -->
  <rect x="470" y="498" width="280" height="100" rx="14" fill="#fff" stroke="#4285F4" stroke-width="2" filter="url(#shadow)"/>
  <rect x="470" y="498" width="280" height="6" rx="3" fill="url(#blueGrad)"/>
  <use href="#gemini-icon" x="490" y="516" width="24" height="24"/>
  <text x="520" y="534" font-size="14" font-weight="700" fill="#202124">research_agent</text>
  <rect x="648" y="520" width="80" height="20" rx="10" fill="#E8F0FE"/>
  <text x="688" y="534" text-anchor="middle" font-size="10" font-weight="500" fill="#1A73E8">LlmAgent</text>
  <text x="490" y="558" font-size="11" fill="#5F6368">Gathers raw financial data</text>
  <text x="490" y="574" font-size="10" fill="#34A853" font-weight="500">Tools: McpToolset (Alpha Vantage)</text>

  <!-- Arrow from Research to Alpha Vantage -->
  <line x1="470" y1="520" x2="385" y2="520" stroke="#34A853" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <!-- Arrow between agents -->
  <line x1="610" y1="598" x2="610" y2="628" stroke="#5F6368" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="575" y="606" width="70" height="18" rx="9" fill="#F1F3F4"/>
  <text x="610" y="619" text-anchor="middle" font-size="9" fill="#5F6368" font-weight="500">raw data</text>

  <!-- Analyst Agent -->
  <rect x="470" y="632" width="280" height="100" rx="14" fill="#fff" stroke="#EA4335" stroke-width="2" filter="url(#shadow)"/>
  <rect x="470" y="632" width="280" height="6" rx="3" fill="url(#redGrad)"/>
  <use href="#gemini-icon" x="490" y="650" width="24" height="24"/>
  <text x="520" y="668" font-size="14" font-weight="700" fill="#202124">analyst_agent</text>
  <rect x="640" y="654" width="80" height="20" rx="10" fill="#FCE8E6"/>
  <text x="680" y="668" text-anchor="middle" font-size="10" font-weight="500" fill="#C5221F">LlmAgent</text>
  <text x="490" y="692" font-size="11" fill="#5F6368">Interprets data, provides recommendations</text>
  <text x="490" y="708" font-size="10" fill="#EA4335" font-weight="500">Tools: None (analysis only)</text>

  <!-- Output arrow -->
  <line x1="610" y1="732" x2="610" y2="762" stroke="#EA4335" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Recommendation badge -->
  <rect x="530" y="766" width="160" height="34" rx="17" fill="url(#redGrad)" filter="url(#shadowSmall)"/>
  <text x="610" y="788" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Recommendation</text>

  <!-- ========== LEGEND ========== -->
  <rect x="40" y="580" width="340" height="220" rx="12" fill="#fff" stroke="#DADCE0" stroke-width="1" filter="url(#shadowSmall)"/>
  <text x="60" y="604" font-size="13" font-weight="700" fill="#202124">Protocol Legend</text>

  <!-- MCP -->
  <rect x="60" y="618" width="14" height="14" rx="3" fill="url(#greenGrad)"/>
  <text x="82" y="630" font-size="11" fill="#202124" font-weight="500">MCP</text>
  <text x="120" y="630" font-size="10" fill="#5F6368">Model Context Protocol (tool access)</text>

  <!-- ADK -->
  <rect x="60" y="642" width="14" height="14" rx="3" fill="url(#blueGrad)"/>
  <text x="82" y="654" font-size="11" fill="#202124" font-weight="500">ADK</text>
  <text x="120" y="654" font-size="10" fill="#5F6368">Agent Development Kit (orchestration)</text>

  <!-- A2A -->
  <rect x="60" y="666" width="14" height="14" rx="3" fill="url(#purpleGrad)"/>
  <text x="82" y="678" font-size="11" fill="#202124" font-weight="500">A2A</text>
  <text x="120" y="678" font-size="10" fill="#5F6368">Agent2Agent Protocol (networking)</text>

  <!-- Gemini -->
  <use href="#gemini-icon" x="58" y="688" width="18" height="18"/>
  <text x="82" y="702" font-size="11" fill="#202124" font-weight="500">Gemini</text>
  <text x="128" y="702" font-size="10" fill="#5F6368">Gemini 2.5 Flash (LLM backbone)</text>

  <!-- Alpha Vantage -->
  <rect x="60" y="714" width="14" height="14" rx="3" fill="#fff" stroke="#34A853" stroke-width="1.5"/>
  <text x="82" y="726" font-size="11" fill="#202124" font-weight="500">AV</text>
  <text x="100" y="726" font-size="10" fill="#5F6368">Alpha Vantage (financial data APIs)</text>

  <!-- Line styles -->
  <text x="60" y="752" font-size="11" font-weight="600" fill="#202124">Connections</text>
  <line x1="60" y1="764" x2="100" y2="764" stroke="#5F6368" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="108" y="768" font-size="10" fill="#5F6368">Client request</text>
  <line x1="200" y1="764" x2="240" y2="764" stroke="#34A853" stroke-width="2"/>
  <text x="248" y="768" font-size="10" fill="#5F6368">MCP / HTTP</text>
</svg>