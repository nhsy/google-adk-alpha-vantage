version: '3'

dotenv: ['.env']

vars:
  PYTHON: uv run
  AGENT_PORT: 10000
  ADK_PORT: 8000

tasks:
  init:
    desc: Initialize the project (install deps, pre-commit hooks)
    cmds:
      - uv sync
      - uv run pre-commit install
    status:
      - test -d .venv

  deps:
    desc: Check for required dependencies
    cmds:
      - uv --version
      - python --version

  up:
    desc: Start all servers
    deps:
      - task: up:agent
      - task: up:adk

  up:agent:
    desc: Start the A2A Agent Server
    cmds:
      - "{{.PYTHON}} python -m src.agent"
    env:
      AGENT_PORT: "{{.AGENT_PORT}}"
      PYTHONPATH: "."
      PYTHONWARNINGS: "ignore::UserWarning:google.adk"
      ALPHA_VANTAGE_API_KEY: "{{.ALPHA_VANTAGE_API_KEY}}"
      AGENT_GEMINI_MODEL: "{{.AGENT_GEMINI_MODEL}}"
      GOOGLE_API_KEY: "{{.GOOGLE_API_KEY}}"
      GOOGLE_GENAI_USE_VERTEXAI: "{{.GOOGLE_GENAI_USE_VERTEXAI}}"
      GOOGLE_CLOUD_PROJECT: "{{.GOOGLE_CLOUD_PROJECT}}"
      GOOGLE_CLOUD_LOCATION: "{{.GOOGLE_CLOUD_LOCATION}}"

  agent:card:
    desc: Fetch and pretty-print the A2A Agent Card
    cmds:
      - curl -s http://localhost:{{.AGENT_PORT}}/.well-known/agent-card.json | python -m json.tool

  up:adk:
    aliases: [adk]
    desc: Start the ADK Workbench (web UI)
    dir: src/
    cmds:
      - adk web
    env:
      PORT: "{{.ADK_PORT}}"
      PYTHONWARNINGS: "ignore::UserWarning"
      ALPHA_VANTAGE_API_KEY: "{{.ALPHA_VANTAGE_API_KEY}}"
      AGENT_GEMINI_MODEL: "{{.AGENT_GEMINI_MODEL}}"
      GOOGLE_API_KEY: "{{.GOOGLE_API_KEY}}"
      GOOGLE_GENAI_USE_VERTEXAI: "{{.GOOGLE_GENAI_USE_VERTEXAI}}"
      GOOGLE_CLOUD_PROJECT: "{{.GOOGLE_CLOUD_PROJECT}}"
      GOOGLE_CLOUD_LOCATION: "{{.GOOGLE_CLOUD_LOCATION}}"

  down:
    desc: Stop all servers
    cmds:
      - lsof -i :{{.AGENT_PORT}} -t | xargs kill -9 || true
      - lsof -i :{{.ADK_PORT}} -t | xargs kill -9 || true

  demo:
    desc: Run all demos
    cmds:
      - task: demo:agent
      - task: demo:a2a

  demo:agent:
    desc: Run the single-agent demo (4 scenarios)
    cmds:
      - "{{.PYTHON}} python scripts/agent_demo.py"
    env:
      PYTHONPATH: "."
      PYTHONWARNINGS: "ignore::UserWarning:google.adk"
      ALPHA_VANTAGE_API_KEY: "{{.ALPHA_VANTAGE_API_KEY}}"
      AGENT_GEMINI_MODEL: "{{.AGENT_GEMINI_MODEL}}"
      GOOGLE_API_KEY: "{{.GOOGLE_API_KEY}}"
      GOOGLE_GENAI_USE_VERTEXAI: "{{.GOOGLE_GENAI_USE_VERTEXAI}}"
      GOOGLE_CLOUD_PROJECT: "{{.GOOGLE_CLOUD_PROJECT}}"
      GOOGLE_CLOUD_LOCATION: "{{.GOOGLE_CLOUD_LOCATION}}"

  demo:a2a:
    desc: Run the A2A multi-agent demo
    cmds:
      - "{{.PYTHON}} python scripts/a2a_demo.py"
    env:
      PYTHONPATH: "."
      PYTHONWARNINGS: "ignore::UserWarning:google.adk"
      ALPHA_VANTAGE_API_KEY: "{{.ALPHA_VANTAGE_API_KEY}}"
      AGENT_GEMINI_MODEL: "{{.AGENT_GEMINI_MODEL}}"
      GOOGLE_API_KEY: "{{.GOOGLE_API_KEY}}"
      GOOGLE_GENAI_USE_VERTEXAI: "{{.GOOGLE_GENAI_USE_VERTEXAI}}"
      GOOGLE_CLOUD_PROJECT: "{{.GOOGLE_CLOUD_PROJECT}}"
      GOOGLE_CLOUD_LOCATION: "{{.GOOGLE_CLOUD_LOCATION}}"

  test:
    desc: Run all tests
    cmds:
      - "{{.PYTHON}} pytest tests/"
    env:
      PYTHONPATH: "."
      ALPHA_VANTAGE_API_KEY: "{{.ALPHA_VANTAGE_API_KEY}}"
      AGENT_GEMINI_MODEL: "{{.AGENT_GEMINI_MODEL}}"
      GOOGLE_API_KEY: "{{.GOOGLE_API_KEY}}"
      GOOGLE_GENAI_USE_VERTEXAI: "{{.GOOGLE_GENAI_USE_VERTEXAI}}"
      GOOGLE_CLOUD_PROJECT: "{{.GOOGLE_CLOUD_PROJECT}}"
      GOOGLE_CLOUD_LOCATION: "{{.GOOGLE_CLOUD_LOCATION}}"

  test:cov:
    desc: Run tests with coverage report
    cmds:
      - "{{.PYTHON}} pytest --cov=src --cov-report=term-missing tests/"
    env:
      PYTHONPATH: "."
      ALPHA_VANTAGE_API_KEY: "{{.ALPHA_VANTAGE_API_KEY}}"
      AGENT_GEMINI_MODEL: "{{.AGENT_GEMINI_MODEL}}"
      GOOGLE_API_KEY: "{{.GOOGLE_API_KEY}}"
      GOOGLE_GENAI_USE_VERTEXAI: "{{.GOOGLE_GENAI_USE_VERTEXAI}}"
      GOOGLE_CLOUD_PROJECT: "{{.GOOGLE_CLOUD_PROJECT}}"
      GOOGLE_CLOUD_LOCATION: "{{.GOOGLE_CLOUD_LOCATION}}"

  test:a2a:
    desc: Run A2A integration tests (requires agent server to be running)
    cmds:
      - "{{.PYTHON}} python tests/test_client.py"
    env:
      AGENT_PORT: "{{.AGENT_PORT}}"
      PYTHONPATH: "."
      ALPHA_VANTAGE_API_KEY: "{{.ALPHA_VANTAGE_API_KEY}}"
      AGENT_GEMINI_MODEL: "{{.AGENT_GEMINI_MODEL}}"
      GOOGLE_API_KEY: "{{.GOOGLE_API_KEY}}"
      GOOGLE_GENAI_USE_VERTEXAI: "{{.GOOGLE_GENAI_USE_VERTEXAI}}"
      GOOGLE_CLOUD_PROJECT: "{{.GOOGLE_CLOUD_PROJECT}}"
      GOOGLE_CLOUD_LOCATION: "{{.GOOGLE_CLOUD_LOCATION}}"

  lint:
    desc: Run linting and formatting
    cmds:
      - "{{.PYTHON}} ruff check ."
      - "{{.PYTHON}} ruff format ."
